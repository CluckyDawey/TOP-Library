<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOP Library</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-grid">
    <aside id="side-panel" class="side-panel">
      <button id="panel-toggle" class="panel-toggle" aria-label="Toggle side panel">
        ☰
      </button>
      <div class="panel-content">
        <h2>Library Menu</h2>
        <button id="open-add-book" class="primary-btn" type="button">+ Add Book</button>
        <button id="nightmode-toggle" class="secondary-btn" type="button" aria-pressed="false">Toggle Night Mode</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="main-header">
        <h1>TOP Library</h1>
      </header>
      <section id="book-list" class="book-list" aria-live="polite"></section>
    </main>
  </div>

  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-dialog">
      <div class="modal-header">
        <h2 id="modal-title">Add New Book</h2>
        <button id="modal-close" class="close-btn" aria-label="Close dialog">×</button>
      </div>
      <form id="add-book-form" class="modal-form" novalidate>
        <label for="title">Title</label>
        <input id="title" name="title" type="text" required />

        <label for="author">Author</label>
        <input id="author" name="author" type="text" required />

        <label for="pages">Pages</label>
        <input id="pages" name="pages" type="number" min="1" required />

        <label class="read-checkbox">
          <input id="read" name="read" type="checkbox" /> Read
        </label>

        <div class="modal-actions">
          <button id="cancel-btn" class="secondary-btn" type="button">Cancel</button>
          <button class="primary-btn" type="submit">Save Book</button>
        </div>
      </form>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
